services:
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    ports:
      - "3032:8000"
    environment:
      - APP_ENV=development
      - DATABASE_URL=${DATABASE_URL:-postgresql://seo:${POSTGRES_PASSWORD}@db:5432/seo_health}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env}
    volumes:
      - .:/app
      - ./reports:/app/reports
    depends_on:
      - db
    networks:
      - seo-network

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/worker.Dockerfile
    environment:
      - APP_ENV=development
      - DATABASE_URL=${DATABASE_URL:-postgresql://seo:${POSTGRES_PASSWORD}@db:5432/seo_health}
      - WORKER_LEASE_SECONDS=300
    volumes:
      - .:/app
      - ./reports:/app/reports
    depends_on:
      - db
    networks:
      - seo-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-seo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      - POSTGRES_DB=${POSTGRES_DB:-seo_health}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - seo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seo -d seo_health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  seo-network:
    driver: bridge

volumes:
  postgres_data:
